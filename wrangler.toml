name = "mailfree3"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "aae7e1ef-419b-462b-badc-2cfc1364e279" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="tdwadmin"
ADMIN_PASSWORD="tdw453995"
GUEST_PASSWORD="guest"
JWT_TOKEN="tdw453995"
JWT_TOKENGUEST_PASSWORD="tdw453995"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="aibienao.top"
RESEND_API_KEY="tdw453995"
EMAIL_WEBHOOK_URL="http://121.43.32.165:8000"
EMAIL_WEBHOOK_SECRET="tdw453995"
EMAIL_WEBHOOK_TIMEOUT_MS="10000"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true